name: suisui_kana
description: "Suisui Kana — learn hiragana & katakana by writing them, smoothly (すいすい)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_digital_ink_recognition: ^0.13.0
  shared_preferences: ^2.2.3
  flutter_tts: ^4.0.2
  android_intent_plus: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
