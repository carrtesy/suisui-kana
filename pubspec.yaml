name: suisui_kana
description: "Suisui Kana — learn hiragana & katakana by writing them, smoothly (すいすい)."
publish_to: 'none'
version: 1.2.2+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_digital_ink_recognition: ^0.14.2
  shared_preferences: ^2.2.3
  flutter_tts: ^4.0.2
  android_intent_plus: ^5.1.0
  google_fonts: ^6.2.1
  audioplayers: ^6.8.1
  google_mobile_ads: ^9.0.0
  path_provider: ^2.1.6
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# Launcher icon — the image applied as-is (legacy launcher icon).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "store/icons/suisui-kana-final-1024.png"
